<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 140" fill="none">
  <!-- Mountain peak outline (thick hollow triangle) -->
  <path d="M80 8 L152 118 L132 118 L80 32 L28 118 L8 118 Z" fill="black"/>

  <!-- Jagged zigzag / chart line cutting through the mountain -->
  <polyline
    points="18,108  34,72  44,90  60,44  78,76  90,102  106,65  122,90"
    stroke="black" stroke-width="10" stroke-linejoin="miter" stroke-linecap="square" fill="none"/>

  <!-- Arrow: upper-right -->
  <line x1="122" y1="90" x2="144" y2="64" stroke="black" stroke-width="10" stroke-linecap="square"/>
  <polygon points="144,64 128,67 135,81" fill="black"/>

  <!-- Arrow: lower-right -->
  <line x1="122" y1="90" x2="146" y2="112" stroke="black" stroke-width="10" stroke-linecap="square"/>
  <polygon points="146,112 138,98 150,100" fill="black"/>
</svg>
